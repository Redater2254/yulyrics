<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>yulyrics overlay</title>
    <!--
      번들 폰트. font-display:block 이라 폰트가 준비되기 전에는 글자를 그리지 않는다.
      스트림에서 대체 폰트로 한 번 그렸다가 바뀌는 것(FOUT)이 훨씬 눈에 띈다.
    -->
    <link rel="stylesheet" href="/fonts/fonts.css" />
    <style>
      /* OBS 브라우저 소스는 기본이 투명이다. 아무것도 칠하지 않는 것이 핵심. */
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: transparent;
        overflow: hidden;
        cursor: none;
      }

      /* ?debug=1 로 열었을 때만 배경을 깔아 브라우저에서 확인할 수 있게 한다 */
      body.yl-debug {
        background: repeating-conic-gradient(#2a2d33 0% 25%, #1e2126 0% 50%) 50% / 40px 40px;
      }

      #yl-status {
        position: fixed;
        left: 12px;
        bottom: 10px;
        font: 12px/1.4 ui-monospace, Consolas, monospace;
        color: #ff5f56;
        background: #000000cc;
        padding: 6px 10px;
        border-radius: 6px;
        z-index: 9999;
        display: none;
      }
    </style>
  </head>
  <body>
    <div id="yl-root"></div>
    <div id="yl-status"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
